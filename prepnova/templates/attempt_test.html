{% extends 'base.html' %}

{% block content %}
<div class="content">
<h2>{{ test.title }}</h2>

<div id="timer" style="font-size:20px; margin-bottom:20px;">Time Left: 60s</div>

<form method="post" id="testForm">{% csrf_token %}

{% for q in questions %}
<div class="card question" style="display:none;">
    <p><b>Q{{ forloop.counter }}. {{ q.text }}</b></p>

    {% if q.option1 %}
    <label><input type="radio" name="{{q.id}}" value="{{q.option1}}"> {{q.option1}}</label><br>
    <label><input type="radio" name="{{q.id}}" value="{{q.option2}}"> {{q.option2}}</label><br>
    <label><input type="radio" name="{{q.id}}" value="{{q.option3}}"> {{q.option3}}</label><br>
    <label><input type="radio" name="{{q.id}}" value="{{q.option4}}"> {{q.option4}}</label><br>
    {% else %}
    <input type="text" name="{{q.id}}" placeholder="Your Answer">
    {% endif %}
</div>
{% endfor %}

<div style="margin-top:20px;">
<button type="button" class="btn" onclick="prevQuestion()">Previous</button>
<button type="button" class="btn" onclick="nextQuestion()">Next</button>
<button type="submit" class="btn">Submit</button>
</div>

</form>
</div>

<script>
let current = 0;
let questions = document.querySelectorAll('.question');

function showQuestion(index){
    questions.forEach((q,i)=> q.style.display = i === index ? 'block':'none');
}

function nextQuestion(){
    if(current < questions.length -1){
        current++;
        showQuestion(current);
    }
}

function prevQuestion(){
    if(current > 0){
        current--;
        showQuestion(current);
    }
}

// Timer
let time = 60;
let timer = document.getElementById('timer');

let countdown = setInterval(()=>{
    time--;
    timer.innerText = "Time Left: " + time + "s";
    if(time <= 0){
        clearInterval(countdown);
        document.getElementById('testForm').submit();
    }
},1000);

showQuestion(current);
</script>

{% endblock %}
