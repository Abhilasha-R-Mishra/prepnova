name: 'Deploy Django Application to AWS'
'on':
  push:
    branches:
      - 'main'
      
jobs:
  deploy:
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout Code'
        uses: 'actions/checkout@v4'
        
      - name: 'Deploy Ia SSH'
        uses: 'appleboy/ssh-action@v1.0.3'
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script:
            cd / root/server_path'
            git pull
            doker compose up -d --build
  
